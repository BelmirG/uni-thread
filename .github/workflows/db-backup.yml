name: Nightly database backup

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      # The server runs PostgreSQL 18 and pg_dump must be same or newer, but the
      # runner's preinstalled client is 16 — so run pg_dump from the postgres:18
      # image instead of fighting apt.
      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_PUBLIC_URL }}
        run: |
          docker run --rm -e DATABASE_URL postgres:18 \
            sh -c 'pg_dump "$DATABASE_URL" -Fc' > "unithread-$(date -u +%F).dump"
          ls -lh unithread-*.dump

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp "unithread-$(date -u +%F).dump" "s3://unithread-backups/" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
