services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ius
      POSTGRES_PASSWORD: ius_password
      POSTGRES_DB: iusconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ius -d iusconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ius:ius_password@postgres:5432/iusconnect
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-key-change-before-production
      ADMIN_KEY: change-this-before-deploying
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # Used by next.config.js rewrites (server-side, Docker internal network)
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
